{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2b3c6b;
            --bg-1: #f6f8fc;
            --bg-2: #e9eef8;
            --text-1: #1f2a44;
            --text-2: #4b5875;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 15% 20%, #ffffff 0%, var(--bg-1) 45%, var(--bg-2) 100%);
            color: var(--text-1);
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .card {
            width: min(680px, 100%);
            background: rgba(255,255,255,0.9);
            border: 1px solid #dce5f5;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(43, 60, 107, 0.12);
            padding: 2rem;
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: grid;
            place-items: center;
            background: rgba(43, 60, 107, 0.12);
            color: var(--primary);
            font-size: 1.6rem;
            font-weight: 700;
        }
        h1 { margin: 0 0 0.6rem; font-size: 1.9rem; color: var(--primary); }
        p { margin: 0; color: var(--text-2); line-height: 1.6; }
        .code {
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #70809f;
        }
    </style>
</head>
<body>
    <section class="card" role="status" aria-live="polite">
        <div class="icon">!</div>
        <h1>Site Under Maintenance</h1>
        <p>{{ maintenance_message }}</p>
        <p class="code">HTTP 503 • Please try again later.</p>
    </section>
</body>
</html>
