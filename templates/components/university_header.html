{% load static %}

<!-- University Header Section -->
<header class="university-header" aria-label="University identity">
    <div class="container-fluid h-100">
        <div class="header-content">
            <!-- Left: NORSU Logo -->
            <div class="header-left">
                <img src="{% static 'images/logo_norsu.png' %}" alt="NORSU Logo" class="norsu-logo">
            </div>
            <!-- Center: University Name -->
            <div class="header-center">
                <h1 class="university-name">
                    <span class="text-red">NEGROS</span>
                    <span class="text-blue">ORIENTAL</span>
                    <span class="text-red">STATE</span>
                    <span class="text-blue">UNIVERSITY</span>
                </h1>
                <p class="office-subtitle">Office of the University, Alumni Affairs</p>
            </div>
            <!-- Right: Alumni Logo -->
            <div class="header-right-alumni">
                <a href="https://norsualumni.com/" target="_blank" rel="noopener noreferrer" title="NORSU Alumni" aria-label="Visit the NORSU Alumni website">
                    <img src="{% static 'images/alumni_logo.png' %}" alt="Alumni Affairs Logo" class="alumni-logo">
                </a>
            </div>
        </div>
    </div>
</header>
