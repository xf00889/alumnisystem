{% if all_active_filter_chips %}
<div class="d-flex flex-wrap gap-2 mb-3" id="activeFilterChips" aria-live="polite">
    {% for chip in all_active_filter_chips %}
    <span class="badge bg-light text-dark border px-3 py-2">
        {{ chip.label }}
        {% if chip.remove_url %}
        <a href="{{ chip.remove_url }}" class="ms-2 text-danger text-decoration-none ajax-filter-chip" aria-label="Remove {{ chip.label }}">
            <i class="fas fa-times"></i>
        </a>
        {% endif %}
    </span>
    {% endfor %}
    <a href="{{ reset_filters_url }}" class="small fw-semibold text-decoration-none ms-2">Reset Filters</a>
</div>
{% endif %}
